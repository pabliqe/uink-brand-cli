name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test --if-present
      
      - name: Test CLI execution
        run: |
          # Create a test brand.json
          cat > brand.json << 'EOF'
          {
            "brand": {
              "name": { "$value": "Test Brand", "$type": "string" },
              "description": { "$value": "Test description", "$type": "string" }
            },
            "colors": {
              "primary": {
                "DEFAULT": { "$value": "#E00069", "$type": "color" }
              }
            }
          }
          EOF
          
          # Run the CLI
          node bin/cli.js --help
          node bin/cli.js --version
          
          # Test generation
          node bin/cli.js
          
          # Verify outputs exist
          test -f public/og-image.jpg
          test -f public/manifest.json
          test -f .og-brand/BrandMeta.jsx
          
          # Test --force flag (should regenerate)
          node bin/cli.js --force
          
          # Test with existing assets (should detect and skip)
          node bin/cli.js | grep -q "using existing"
          
          echo "✓ CLI test successful"
